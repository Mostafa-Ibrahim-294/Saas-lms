<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم رفض طلب الصداقة</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
            padding: 0;
            direction: rtl;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background-color: #d63031;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            font-size: 24px;
        }

        .content {
            padding: 30px;
            text-align: center;
        }

        .username {
            font-size: 22px;
            font-weight: bold;
            color: #2d3436;
            margin: 20px 0;
        }

        .message {
            font-size: 16px;
            color: #555;
            margin: 15px 0;
        }

        .error {
            font-size: 18px;
            font-weight: bold;
            color: #d63031;
            margin: 15px 0;
        }

        .btn {
            display: inline-block;
            margin: 20px 10px;
            padding: 14px 28px;
            font-size: 15px;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            background-color: #6c5ce7;
        }

        .note {
            font-size: 13px;
            color: #888;
            margin-top: 20px;
        }

        .footer {
            background-color: #f0f0f0;
            text-align: center;
            font-size: 12px;
            color: #888888;
            padding: 15px;
        }

        @media (max-width: 600px) {
            .container {
                margin: 20px;
            }

            .username {
                font-size: 18px;
            }

            .btn {
                display: block;
                margin: 15px auto;
                width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            ❌ تم رفض طلب الصداقة
        </div>
        <div class="content">
            <p>مرحبًا <strong>{{UserName}}</strong>،</p>

            <p class="message">
                نأسف لإبلاغك 😔
            </p>

            <p class="message">
                قام
            </p>

            <div class="username">
                {{FriendName}}
            </div>

            <p class="error">
                برفض طلب الصداقة الخاص بك ❌
            </p>

            <p class="message">
                لا تقلق، يمكنك إرسال طلبات أخرى أو استكشاف أصدقاء جدد داخل التطبيق.
            </p>

            <a href="{{OPEN_APP_URL}}" class="btn">
                استكشاف أصدقاء جدد
            </a>

            <p class="note">
                استمر في التفاعل وبناء شبكة علاقاتك داخل المنصة 🚀
            </p>
        </div>

        <div class="footer">
            © 2026 منصتك. جميع الحقوق محفوظة.
        </div>
    </div>
</body>
</html>
